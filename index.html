<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>インフォグラフィックス 一覧</title>
    <style>
        body {
            font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
            background: #f0f4f8;
            color: #1a1a2e;
            margin: 0;
            padding: 40px 20px;
        }
        h1 {
            text-align: center;
            color: #1a237e;
            margin-bottom: 40px;
        }
        .grid {
            display: flex;
            flex-wrap: wrap;
            gap: 24px;
            justify-content: center;
            max-width: 900px;
            margin: 0 auto;
        }
        .card {
            background: #ffffff;
            border-radius: 12px;
            box-shadow: 0 4px 24px rgba(26,35,126,0.10);
            padding: 28px 32px;
            width: 280px;
            text-decoration: none;
            color: inherit;
            transition: transform 0.2s, box-shadow 0.2s;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 32px rgba(26,35,126,0.18);
        }
        .card .folder {
            font-size: 0.8em;
            color: #5c6bc0;
        }
        .card .title {
            font-size: 1.1em;
            font-weight: bold;
            color: #1a237e;
        }
    </style>
</head>
<body>
    <h1>🗂️ インフォグラフィックス 一覧</h1>
    <div class="grid">
        <a class="card" href="generateAI/llm-local-overview.html">
            <span class="folder">📁 generateAI</span>
            <span class="title">ローカルLLM インフォグラフィック</span>
        </a>
    </div>
</body>
</html>
