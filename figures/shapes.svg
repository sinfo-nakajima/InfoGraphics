<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 300" width="600" height="300">
  <!-- Background -->
  <rect width="600" height="300" fill="#f0f4f8" rx="12"/>

  <!-- Title -->
  <text x="300" y="30" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="bold" fill="#1a237e">基本図形サンプル</text>

  <!-- Rectangle -->
  <rect x="40" y="60" width="120" height="80" fill="#3949ab" rx="6"/>
  <text x="100" y="155" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#333">四角形</text>

  <!-- Circle -->
  <circle cx="260" cy="100" r="45" fill="#00897b"/>
  <text x="260" y="155" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#333">円</text>

  <!-- Triangle -->
  <polygon points="420,60 375,140 465,140" fill="#f57c00"/>
  <text x="420" y="158" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#333">三角形</text>

  <!-- Diamond -->
  <polygon points="545,60 575,100 545,140 515,100" fill="#c62828"/>
  <text x="545" y="158" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#333">菱形</text>

  <!-- Rounded Rectangle -->
  <rect x="40" y="190" width="120" height="60" fill="#6a1b9a" rx="30"/>
  <text x="100" y="265" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#333">角丸四角形</text>

  <!-- Ellipse -->
  <ellipse cx="260" cy="220" rx="60" ry="35" fill="#1565c0"/>
  <text x="260" y="265" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#333">楕円</text>

  <!-- Star -->
  <polygon points="420,185 430,210 458,210 436,226 444,252 420,236 396,252 404,226 382,210 410,210" fill="#ff8f00"/>
  <text x="420" y="265" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#333">星形</text>

  <!-- Pentagon -->
  <polygon points="545,185 572,206 562,237 527,237 517,206" fill="#00695c"/>
  <text x="545" y="265" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#333">五角形</text>
</svg>
